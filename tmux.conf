# Set prefix to Ctrl-Space
set-option -g prefix C-Space
bind-key C-Space send-prefix

set -g  default-terminal "screen-256color"
# needed for proper nvim/tmux/base16 colors
set -ga terminal-overrides ",xterm-256color:Tc"

# Smart pane switching with awareness of Vim splits.
# See: https://github.com/christoomey/vim-tmux-navigator
is_vim="ps -o state= -o comm= -t '#{pane_tty}' \
    | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|n?vim?x?)(diff)?$'"
bind-key -n C-h if-shell "$is_vim" "send-keys C-h"  "select-pane -L"
bind-key -n C-j if-shell "$is_vim" "send-keys C-j"  "select-pane -D"
bind-key -n C-k if-shell "$is_vim" "send-keys C-k"  "select-pane -U"
bind-key -n C-l if-shell "$is_vim" "send-keys C-l"  "select-pane -R"
bind-key -n C-\ if-shell "$is_vim" "send-keys C-\\" "select-pane -l"
bind-key -T copy-mode-vi C-h select-pane -L
bind-key -T copy-mode-vi C-j select-pane -D
bind-key -T copy-mode-vi C-k select-pane -U
bind-key -T copy-mode-vi C-l select-pane -R
bind-key -T copy-mode-vi C-\ select-pane -l

# open panes in a more convenient vim-like manor
bind-key l split-window -h -c '#{pane_current_path}'
bind-key j split-window -v -c '#{pane_current_path}'
# open a new tab (window in tmux parlance)
bind t new-window -c "#{pane_current_path}"

# reload config file
bind r source-file ~/.tmux.conf

# add mouse support
set -g mouse on

# don't rename windows automatically
set-option -g allow-rename off

# 0 is too far
set -g base-index 1
set-window-option -g pane-base-index 1

# No delay for escape key press
set -sg escape-time 0

# set update frequencey
set -g status-interval 1

# active window title colors
set-window-option -g window-status-current-fg brightred #orange
set-window-option -g window-status-current-bg default
set -g status-bg default
set-window-option -g window-status-current-attr bright

# theme
set -g status-justify "left"
set -g status-left-length "100"
set -g status "on"
set -g status-right-length "160"
set -g status-right-attr "none"
set -g message-fg "colour2"
set -g message-bg "colour0"
set -g status-attr "none"
set -g pane-border-bg default
set -g pane-active-border-bg default
set -g pane-border-fg "colour240"
set -g pane-active-border-fg "colour2"
set -g status-left-attr "none"
setw -g window-status-bg "default"
setw -g window-status-fg "colour242"
setw -g window-status-attr "none"
setw -g window-status-activity-attr "none"
setw -g window-status-activity-fg "colour2"
setw -g window-status-separator ""
set -g status-left "#[fg=colour2,nobold,nounderscore,noitalics]"
set -g status-right "#{prefix_highlight} #[fg=colour0,nobold,nounderscore,noitalics] #[fg=colour242] %d-%m-%Y | %R"
setw -g window-status-format "#[fg=colour0,nobold,nounderscore,noitalics] #[default] #W #[fg=colour0,nobold,nounderscore,noitalics]"
setw -g window-status-current-format "#[fg=colour0,nobold,nounderscore,noitalics] #[fg=colour9] #W #[fg=colour0,nobold,nounderscore,noitalics]"
