# Mouse support
set-option -g mouse on
set -g @scroll-speed-num-lines-per-scroll "1"

# 256color support
set -g default-terminal "screen-256color"
# needed for proper nvim/tmux/base16 colors
set -ga terminal-overrides ",xterm-256color:Tc"

# Set scrollback history to 10000 (10k)
set -g history-limit 10000

# Set Ctrl-<space> as the default prefix key combination
unbind C-b # Unbind C-b
set -g prefix C-Space # Use ctrl-space as prefix
bind Space send-prefix # Use send-prefix to pass ctrl-a through to the application

# No delay for escape key press
set -sg escape-time 0

# Set window and pane index to 1 (0 by default)
set-option -g base-index 1
setw -g pane-base-index 1

# Reload ~/.tmux.conf using PREFIX r
bind r source-file ~/.tmux.conf \; display "Reloaded!"

# Set status bar at the top
set-option -g status-position top # Not sure about this yet. TBD

# Open panes in a more convenient vim-like manor
bind-key l split-window -h -c '#{pane_current_path}'
bind-key j split-window -v -c '#{pane_current_path}'
# Open a new tab (window in tmux parlance)
bind t new-window -c "#{pane_current_path}"

# Smart pane switching with awareness of Vim splits.
# See: https://github.com/christoomey/vim-tmux-navigator
is_vim="ps -o state= -o comm= -t '#{pane_tty}' \
    | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|n?vim?x?)(diff)?$'"
bind-key -n C-h if-shell "$is_vim" "send-keys C-h"  "select-pane -L"
bind-key -n C-j if-shell "$is_vim" "send-keys C-j"  "select-pane -D"
bind-key -n C-k if-shell "$is_vim" "send-keys C-k"  "select-pane -U"
bind-key -n C-l if-shell "$is_vim" "send-keys C-l"  "select-pane -R"
bind-key -n C-\ if-shell "$is_vim" "send-keys C-\\" "select-pane -l"
bind-key -T copy-mode-vi C-h select-pane -L
bind-key -T copy-mode-vi C-j select-pane -D
bind-key -T copy-mode-vi C-k select-pane -U
bind-key -T copy-mode-vi C-l select-pane -R
bind-key -T copy-mode-vi C-\ select-pane -l

# Restore prefix-l for clear screen
bind C-l send-keys 'C-l'

# Don't rename windows automatically
set-option -g allow-rename off

###############################################################################################
## Theme
###############################################################################################
# Panes
set -g pane-border-style fg=colour0
set -g pane-active-border-style fg=colour238

# Toggle statusbar
bind-key b set-option status

# status line
set -g status-justify left
set -g status-style bg=default,fg=default
set -g status-interval 1

# messaging
set -g message-style fg=black,bg=yellow
set -g message-command-style fg=blue,bg=black
set -g automatic-rename on

# window mode
setw -g mode-style bg=colour6,fg=colour0

# colors
setw -g window-status-format "#[fg=colour3] •#[fg=colour8] #W "
setw -g window-status-current-format "#[fg=colour2] •#[fg=colour7] #W "
setw -g window-status-current-style dim
set -g status-position bottom
set -g status-justify centre
set -g status-left "  #[fg=colour3]• #[fg=colour2]• #[fg=colour4]•"
set -g status-right " #[fg=colour4] •#[fg=colour8] #S  "

